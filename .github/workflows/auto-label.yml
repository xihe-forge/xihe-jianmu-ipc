name: Auto Label

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    name: Label Issues by Template
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Detect issue template and apply label
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';

            // 根据 Issue 模板特征判断类型
            // bug-report 模板包含 "复现步骤" 或 "Bug Report" 标记
            const isBug =
              body.includes('<!-- bug-report -->') ||
              body.includes('**复现步骤') ||
              body.match(/^#+\s*(bug|缺陷|问题复现)/im);

            // feature-request 模板包含 "需求背景" 或 "Feature Request" 标记
            const isFeature =
              body.includes('<!-- feature-request -->') ||
              body.includes('**需求背景') ||
              body.match(/^#+\s*(feature|新功能|功能请求)/im);

            const labels = [];
            if (isBug) labels.push('type/bug');
            if (isFeature) labels.push('type/feature');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
              console.log(`Applied labels: ${labels.join(', ')}`);
            } else {
              console.log('No matching template detected, skipping label.');
            }

  label-pull-requests:
    name: Label PRs by Changed Files
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # 配置文件位于目标项目 .github/labeler.yml
          # 由 harness init 从 domains/software/templates/labeler.yml 复制
          configuration-path: .github/labeler.yml
          sync-labels: false
