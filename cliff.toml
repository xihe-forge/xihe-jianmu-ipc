# git-cliff 配置
# 基于 Conventional Commits 自动生成 Changelog

[changelog]
header = """
# Changelog\n
本文件由 [git-cliff](https://git-cliff.org) 自动生成。\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.breaking %} (**BREAKING**){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->新功能" },
    { message = "^fix", group = "<!-- 1 -->Bug 修复" },
    { message = "^refactor", group = "<!-- 2 -->重构" },
    { message = "^perf", group = "<!-- 3 -->性能优化" },
    { message = "^docs", group = "<!-- 4 -->文档" },
    { message = "^test", group = "<!-- 5 -->测试" },
    { message = "^ci", group = "<!-- 6 -->CI/CD" },
    { message = "^chore", group = "<!-- 7 -->杂项" },
    { message = "^style", group = "<!-- 8 -->代码风格" },
    { body = ".*security", group = "<!-- 9 -->安全" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
